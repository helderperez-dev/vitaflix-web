name: Supabase Sync Source Schema to Migrations

on:
  workflow_dispatch:
    inputs:
      source:
        description: "sandbox | production"
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
          - production
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: supabase-sync-source-schema
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Execution plan
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SOURCE_PLAN=sandbox
          else
            SOURCE_PLAN="${{ github.event.inputs.source }}"
          fi
          echo "## Supabase Schema Sync Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: $SOURCE_PLAN" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: pull source schema and open/update migration PR" >> "$GITHUB_STEP_SUMMARY"
      - name: Install dependencies
        run: npm ci
      - name: Resolve source credentials
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SOURCE=sandbox
          else
            SOURCE="${{ github.event.inputs.source }}"
          fi
          if [ "$SOURCE" = "sandbox" ]; then
            echo "SOURCE_SUPABASE_URL=${{ secrets.SUPABASE_SANDBOX_URL }}" >> $GITHUB_ENV
            echo "SOURCE_PROJECT_REF=${{ secrets.SUPABASE_SANDBOX_PROJECT_REF }}" >> $GITHUB_ENV
            echo "SOURCE_DB_PASSWORD=${{ secrets.SUPABASE_SANDBOX_DB_PASSWORD }}" >> $GITHUB_ENV
            echo "SUPABASE_ACCESS_TOKEN=${{ secrets.SUPABASE_SANDBOX_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SCHEMA_SYNC_PREFIX=sandbox_auth_storage_sync" >> $GITHUB_ENV
          else
            echo "SOURCE_SUPABASE_URL=${{ secrets.SUPABASE_PRODUCTION_URL }}" >> $GITHUB_ENV
            echo "SOURCE_PROJECT_REF=${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}" >> $GITHUB_ENV
            echo "SOURCE_DB_PASSWORD=${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}" >> $GITHUB_ENV
            echo "SUPABASE_ACCESS_TOKEN=${{ secrets.SUPABASE_PRODUCTION_ACCESS_TOKEN }}" >> $GITHUB_ENV
            echo "SCHEMA_SYNC_PREFIX=production_auth_storage_sync" >> $GITHUB_ENV
          fi
          echo "SYNC_SOURCE_LABEL=$SOURCE" >> $GITHUB_ENV
      - name: Validate Supabase access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing Supabase access token secret for source '$SYNC_SOURCE_LABEL'."
            echo "Add SUPABASE_${SYNC_SOURCE_LABEL^^}_ACCESS_TOKEN in GitHub repository secrets."
            exit 1
          fi
      - name: Block unsafe generated schema migrations
        run: |
          if ls supabase/migrations/*_remote_schema.sql >/dev/null 2>&1; then
            echo "Found unsafe generated migration file(s):"
            ls -1 supabase/migrations/*_remote_schema.sql
            echo "Remove or fix these files before running schema sync."
            exit 1
          fi
      - name: Sync schema migrations
        env:
          SCHEMA_SYNC_DB_PULL_RETRIES: "3"
          SCHEMA_SYNC_DEBUG_DB_PULL: "false"
          SCHEMA_SYNC_PUBLIC_DIFF_FALLBACK: "false"
          SCHEMA_SYNC_FALLBACK_DUMP: "false"
        run: npm run schema:sync:source
      - name: Create pull request with migration updates
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync source schema migrations (${{ env.SYNC_SOURCE_LABEL }})"
          branch: "chore/sync-source-schema-migrations-${{ env.SYNC_SOURCE_LABEL }}"
          title: "chore: sync source schema migrations (${{ env.SYNC_SOURCE_LABEL }})"
          body: "Automated schema migration sync from selected Supabase source."
          add-paths: |
            supabase/migrations/**
