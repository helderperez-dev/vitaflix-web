name: Supabase Staging Migrations

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_SANDBOX_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_SANDBOX_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_SANDBOX_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - name: Execution plan
        run: |
          echo "## Supabase Staging Migration Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target environment: staging" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: link staging project and run supabase db push --linked" >> "$GITHUB_STEP_SUMMARY"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate Supabase credentials
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Missing required Supabase secrets for staging workflow."
            echo "Required: SUPABASE_SANDBOX_ACCESS_TOKEN, SUPABASE_SANDBOX_PROJECT_REF, SUPABASE_SANDBOX_DB_PASSWORD"
            exit 1
          fi
      - name: Block snapshot migrations
        run: |
          if ls supabase/migrations/*_snapshot.sql >/dev/null 2>&1; then
            echo "Snapshot migrations are not safe for db push."
            echo "Remove snapshot files and replace with incremental migrations."
            ls -1 supabase/migrations/*_snapshot.sql
            exit 1
          fi
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - run: supabase db push --linked
