name: Supabase Production Migrations

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Type APPLY to run production migrations"
        required: true
        default: ""
        type: string

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm_apply == 'APPLY' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PRODUCTION_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - name: Execution plan
        run: |
          echo "## Supabase Production Migration Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target environment: production" >> "$GITHUB_STEP_SUMMARY"
          echo "- Confirm apply input: ${{ github.event.inputs.confirm_apply }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: link production project and run supabase db push --linked" >> "$GITHUB_STEP_SUMMARY"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate Supabase credentials
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Missing required Supabase secrets for production workflow."
            echo "Required: SUPABASE_PRODUCTION_ACCESS_TOKEN, SUPABASE_PRODUCTION_PROJECT_REF, SUPABASE_PRODUCTION_DB_PASSWORD"
            exit 1
          fi
      - name: Block snapshot migrations
        run: |
          if ls supabase/migrations/*_snapshot.sql >/dev/null 2>&1; then
            echo "Snapshot migrations are not safe for db push."
            echo "Remove snapshot files and replace with incremental migrations."
            ls -1 supabase/migrations/*_snapshot.sql
            exit 1
          fi
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - run: supabase db push --linked
